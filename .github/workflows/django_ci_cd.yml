name: micron_CI_CD

on:
  push:
  pull_request:

env:
  DJANGO_SETTINGS_MODULE: micron.settings

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      max-parallel: 4
      matrix:
        python-version: ['3.11', '3.12']

    services:
      postgres:
        image: postgres:16
        ports:
          - 5432:5432
        env:
          POSTGRES_DB: micron
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 15

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Prepare CI environment
        run: cp micron/.env.ci micron/.env

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8

      - name: Check for missing migrations
        run: python micron/manage.py makemigrations --check --dry-run

      - name: Run migrations
        run: python micron/manage.py migrate

      - name: System check
        run: python micron/manage.py check

      - name: Run tests
        run: python micron/manage.py test

      - name: Run flake8
        run: flake8 micron